<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <!-- 1. 核心與視口設定 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    
    <!-- 2.瀏覽器 UI 主題色 -->
    <meta name="theme-color" content="#040404" />
    
    <!-- 3. 網頁標題與圖示（以後再刪「?v=2」因為頻繁更新要蓋掉舊的資料） -->
    <title>Color Mapper</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />

    <!-- 4. Open Graph 社群分享預覽卡片 -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://color-mapper.vercel.app" />
    <meta property="og:title" content="顏色命名實驗 SemanticColorMapper" />
    <meta property="og:description" content="協助建立人類對顏色的感知地圖。你會如何形容這個顏色？" />
    <meta property="og:image" content="https://color-mapper.vercel.app/og-image.png" />

    <!-- 
      暫時封印 Web Fonts，目前全依賴系統內建字體 (System Fonts)
      
      未來若要啟用，請解除下方註解。
      這段代碼會同時載入 Inter 與 Noto Sans TC 的 Variable Fonts 版本，
      支援 font-weight 100 到 900 的無段微調。
      
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">
    -->
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        future: {
          hoverOnlyWhenSupported: true,
        },
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: [
                '-apple-system',
                '"Inter"',
                '"Helvetica Neue"',
                'Helvetica',
                '"Roboto"',
                '"Segoe UI"',
                '"PingFang TC"',
                '"Noto Sans TC"',
                '"Yu Gothic"',
                '"Segoe UI Emoji"',
                '"Segoe UI Symbol"',
                'sans-serif'
              ],
            },
            gridTemplateColumns: {
              'layout-desktop': '1fr 1fr',
            },
            colors: {
              theme: {
                page: 'var(--color-page-bg)',
                card: 'var(--color-card-bg)',
                'card-border': 'var(--color-card-border)',
                'text-main': 'var(--color-text-main)',
                'text-soft': 'var(--color-text-soft)',
                'text-muted': 'var(--color-text-muted)',
                'text-muted-solid': 'var(--color-text-muted-solid)',
                'text-underline': 'var(--color-text-underline)',
                input: 'var(--color-input-bg)',
                'input-border': 'var(--color-input-border)',
                'input-action': 'var(--color-input-action)',
                brand: 'var(--color-brand-main)',
                'brand-bg': 'var(--color-brand-surface)',
                'brand-text': 'var(--color-brand-text)',
                'toast-bg': 'var(--color-toast-bg)',
                'toast-border': 'var(--color-toast-border)',
                'pane': 'var(--color-pane-bg)',
              }
            }
          }
        }
      }
    </script>
    <script>
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
        if (event.matches) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      });
    </script>
    <style type="text/tailwindcss">
      :root {
        --color-page-bg: oklch(11% 0 0);
        --color-pane-bg: oklch(11% 0 0 / 20%);
        --color-card-bg: oklch(100% 0 0 / 3%);
        --color-card-border: oklch(100% 0 0 / 8%);
        --color-text-main: oklch(100% 0 0);
        --color-text-soft: oklch(100% 0 0 / 78%);
        --color-text-muted: oklch(100% 0 0 / 50%);
        --color-text-underline: oklch(100% 0 0 / 30%);
        --color-input-bg: oklch(100% 0 0 / 5%);
        --color-input-border: oklch(100% 0 0 / 10%);
        --color-input-action: oklch(100% 0 0 / 10%);
        --color-brand-main: oklch(100% 0 0);
        --color-brand-surface: oklch(100% 0 0 / 10%);
        --color-brand-text: oklch(100% 0 0);
        --color-toast-bg: oklch(25% 0 0 / 70%);
        --color-toast-border: oklch(100% 0 0 / 8%);
        --color-chart-grid: oklch(11% 0 0 / 40%);
        --color-chart-axis: oklch(100% 0 0 / 40%);
        --color-chart-gamut: oklch(100% 0 0 / 30%);
        --color-chart-text-cell-light: oklch(0% 0 0 / 90%);
        --color-chart-text-cell-dark: oklch(100% 0 0 / 90%);
      }
      
      html, body { 
        font-family: -apple-system, "Inter", "Helvetica Neue", Helvetica, "Roboto", "Segoe UI", "PingFang TC", "Noto Sans TC", "Yu Gothic", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
        background-color: var(--color-page-bg);
        color: var(--color-text-main);
        margin: 0;
        overflow-x: hidden;
      }

      input[type="search"]::-webkit-search-decoration,
      input[type="search"]::-webkit-search-cancel-button,
      input[type="search"]::-webkit-search-results-button,
      input[type="search"]::-webkit-search-results-decoration {
        -webkit-appearance: none;
        display: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Glassmorphism utilities */
      .glass-panel {
        background: var(--color-card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--color-card-border);
      }
    </style>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
